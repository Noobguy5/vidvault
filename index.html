<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Reel — A Collection of Moving Moments</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0F1117;
            --card-bg: #171B23;
            --accent: #D8B36A;
            --text-primary: #FFFFFF;
            --text-secondary: #A6A6A6;
            --font-title: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            --font-handwritten: 'Caveat', cursive;
            --transition-premium: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow-x: hidden;
        }

        body.hero-lock {
            overflow: hidden;
            height: 100vh;
        }

        /* --- IMMERSIVE INTRO PORTAL --- */
        .intro-portal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            will-change: opacity, transform;
            transition: opacity 1s cubic-bezier(0.85, 0, 0.15, 1), transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .intro-portal.dismissed {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .intro-title {
            font-family: var(--font-title);
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s;
        }

        .intro-subtitle {
            font-family: var(--font-title);
            font-style: italic;
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            color: var(--text-secondary);
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s;
        }

        .intro-btn {
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-primary);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 3rem;
            border-radius: 40px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.7s;
            transition: var(--transition-premium);
        }

        .intro-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- STICKY NAVIGATION --- */
        .navigation-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: rgba(15, 17, 23, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1.5rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-family: var(--font-title);
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 0.6rem 1.2rem 0.6rem 2.5rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.07);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            border: 1.5px solid var(--text-secondary);
            border-radius: 50%;
        }
        .search-icon::after {
            content: '';
            position: absolute;
            bottom: -3px;
            right: -3px;
            width: 4px;
            height: 1.5px;
            background: var(--text-secondary);
            transform: rotate(45deg);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .surprise-btn {
            background: none;
            border: none;
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }

        .surprise-btn:hover {
            color: var(--accent);
        }

        .collection-count {
            font-family: var(--font-title);
            font-style: italic;
            font-size: 1.15rem;
            color: var(--text-secondary);
        }

        /* --- MAIN CONTAINER EXHIBITION --- */
        .exhibition-space {
            max-width: 1600px;
            margin: 0 auto;
            padding: 3rem;
        }

        /* --- FEATURED SECTION (TODAY'S MEMORY) --- */
        .featured-wrapper {
            margin-bottom: 5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.8s;
        }

        .featured-label {
            font-family: var(--font-handwritten);
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        .featured-card {
            position: relative;
            width: 100%;
            height: 520px;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: flex-end;
            transition: var(--transition-premium);
        }

        .featured-card:hover {
            transform: scale(1.005);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .featured-thumbnail-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #0b0c10;
            opacity: 0.75;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .featured-card:hover .featured-thumbnail-video {
            transform: scale(1.01);
        }

        .featured-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(15, 17, 23, 0.95) 0%, rgba(15, 17, 23, 0) 50%);
            z-index: 1;
        }

        .featured-meta {
            position: relative;
            z-index: 2;
            padding: 3rem;
        }

        .featured-title {
            font-family: var(--font-title);
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }

        .featured-play-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            border: 1px solid rgba(216, 179, 106, 0.3);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            background: rgba(15, 17, 23, 0.4);
        }

        /* --- ARTISTIC TRUE-MASONRY GALLERY --- */
        .gallery-title-wrapper {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1rem;
        }

        .gallery-section-title {
            font-family: var(--font-title);
            font-size: 1.75rem;
            font-weight: 300;
            color: var(--text-secondary);
        }

        /* Shifted from Grid to CSS Columns for organic adaptive layout heights without stretching or cropping */
        .gallery-grid {
            column-count: 4;
            column-gap: 2.5rem;
            width: 100%;
        }

        /* --- REFINED CARDS (NATURAL PROPORTIONS) --- */
        .card {
            break-inside: avoid;
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: inline-flex;
            flex-direction: column;
            position: relative;
            width: 100%;
            margin-bottom: 2.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            will-change: transform, opacity;
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition-premium), display 0s;
        }

        .card.ready {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        }

        .card-media-box {
            position: relative;
            width: 100%;
            background-color: #12141a;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-thumb-video {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            display: block;
            opacity: 0.9;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover .card-thumb-video {
            transform: scale(1.01);
            opacity: 1;
        }

        .card-overlay-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 44px;
            height: 44px;
            background: rgba(15, 17, 23, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition-premium);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
        }

        .card-overlay-indicator svg {
            width: 14px;
            height: 14px;
            fill: var(--text-primary);
            margin-left: 2px;
        }

        .card:hover .card-overlay-indicator {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .card-footer {
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            z-index: 3;
        }

        .card-moment-number {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: var(--text-primary);
        }

        .card-label {
            font-family: var(--font-handwritten);
            font-size: 1.35rem;
            color: var(--accent);
        }

        /* --- CINEMATIC MODAL VIEWER SYSTEM --- */
        .viewer-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4000;
            background-color: rgba(9, 10, 14, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            will-change: opacity;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .viewer-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .viewer-window {
            width: 90%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            transform: translateY(30px) scale(0.98);
            will-change: transform;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .viewer-backdrop.active .viewer-window {
            transform: translateY(0) scale(1);
        }

        .viewer-media-frame {
            position: relative;
            width: 100%;
            max-height: 75vh;
            background: #000000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-video-element {
            width: 100%;
            height: auto;
            max-height: 75vh;
            object-fit: contain;
            display: block;
        }

        .viewer-meta-row {
            margin-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.5rem;
        }

        .viewer-title {
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: -0.01em;
        }

        .viewer-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .control-trigger {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.6rem 1.4rem;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-premium);
        }

        .control-trigger:hover {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        .control-trigger.close-trigger {
            border-color: rgba(255,255,255,0.15);
            background: transparent;
        }

        .control-trigger.close-trigger:hover {
            background: #FF4444;
            color: white;
            border-color: #FF4444;
        }

        /* --- EMPTY AND LOADING STATES --- */
        .empty-view-state {
            display: none;
            width: 100%;
            text-align: center;
            padding: 8rem 0;
            color: var(--text-secondary);
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-style: italic;
        }

        .scroll-sentinel {
            width: 100%;
            height: 20px;
            clear: both;
        }

        /* --- SYSTEM RESPONSIVE CALIBRATIONS --- */
        @media (max-width: 1200px) {
            .gallery-grid { column-count: 3; gap: 2rem; }
        }

        @media (max-width: 900px) {
            .gallery-grid { column-count: 2; }
            .navigation-bar { padding: 1.25rem 2rem; }
            .exhibition-space { padding: 2rem; }
            .featured-card { height: 400px; }
        }

        @media (max-width: 600px) {
            .gallery-grid { column-count: 1; }
            .navigation-bar { flex-direction: column; gap: 1rem; align-items: stretch; padding: 1rem; }
            .search-container { width: 100%; }
            .nav-right { justify-content: space-between; }
            .featured-meta { padding: 1.5rem; }
            .featured-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="hero-lock">

    <div class="intro-portal" id="introPortal">
        <h1 class="intro-title">Memory Reel</h1>
        <p class="intro-subtitle">176 moving memories. One collection.</p>
        <button class="intro-btn" onclick="unveilExhibition()">Enter</button>
    </div>

    <nav class="navigation-bar">
        <a href="#" class="nav-brand" onclick="resetFlow(event)">Memory Reel</a>
        
        <div class="search-container">
            <span class="search-icon"></span>
            <input type="text" id="gallerySearch" class="search-input" placeholder="Search moment (e.g. 017, 156)..." oninput="executeSearchFilter()">
        </div>

        <div class="nav-right">
            <button class="surprise-btn" onclick="launchSurpriseMemory()">Surprise Me</button>
            <span class="collection-count" id="liveStatsCount">176 Moments</span>
        </div>
    </nav>

    <main class="exhibition-space">
        
        <section class="featured-wrapper" id="featuredSection">
            <div class="featured-label">Today's Memory</div>
            <div class="featured-card" id="featuredCardElement">
                <video class="featured-thumbnail-video" id="featuredThumb" preload="metadata" muted playsinline></video>
                <div class="featured-gradient"></div>
                <div class="featured-meta">
                    <h2 class="featured-title" id="featuredMetaTitle">Moment #000</h2>
                    <div class="featured-play-badge">
                        <svg width="8" height="10" viewBox="0 0 8 10" style="fill: currentColor; margin-right: 4px;"><path d="M0 0v10l8-5z"/></svg>
                        Reflect
                    </div>
                </div>
            </div>
        </section>

        <section class="gallery-title-wrapper">
            <h2 class="gallery-section-title">The Archive</h2>
        </section>

        <div class="empty-view-state" id="emptyCollectionFeedback">No memories match your query.</div>
        
        <div class="gallery-grid" id="galleryGrid">
            </div>
        
        <div class="scroll-sentinel" id="infiniteSentinel"></div>
    </main>

    <div class="viewer-backdrop" id="cinemaViewer" onclick="handleOutsideViewerClick(event)">
        <div class="viewer-window">
            <div class="viewer-media-frame">
                <video id="viewerVideoAsset" class="main-video-element" controls playsinline></video>
            </div>
            <div class="viewer-meta-row">
                <h3 class="viewer-title" id="viewerAssetLabel">Moment #001</h3>
                <div class="viewer-controls">
                    <button class="control-trigger" onclick="stepViewerAsset(-1)">Previous</button>
                    <button class="control-trigger" onclick="stepViewerAsset(1)">Next</button>
                    <button class="control-trigger close-trigger" onclick="terminateViewerContext()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- System Globals Config ---
        const totalVideos = 176;
        
        const batchRenderLimit = 24;
        let currentlyRenderedCount = 0;
        let currentModalActiveIndex = null;
        let viewFilteredPool = [];

        // --- Core Assembler Machinery ---
        function instantiateExhibition() {
            pickCuratedFeaturedMemory();
            populateBatchSequence();
            buildIntersectionSentinel();
        }

        function pickCuratedFeaturedMemory() {
            const randomFeaturedIndex = Math.floor(Math.random() * totalVideos) + 1;
            const serialString = String(randomFeaturedIndex).padStart(3, '0');
            
            const thumbVideoNode = document.getElementById('featuredThumb');
            const titleNode = document.getElementById('featuredMetaTitle');
            const cardNode = document.getElementById('featuredCardElement');

            titleNode.innerText = `Moment #${serialString}`;
            thumbVideoNode.src = `videos/${serialString}.mp4#t=1`;
            cardNode.onclick = () => launchViewerContext(randomFeaturedIndex);
        }

        function populateBatchSequence() {
            const grid = document.getElementById('galleryGrid');
            
            const nextThreshold = Math.min(currentlyRenderedCount + batchRenderLimit, totalVideos);
            if (currentlyRenderedCount >= totalVideos) return;

            const fragment = document.createDocumentFragment();

            for (let i = currentlyRenderedCount + 1; i <= nextThreshold; i++) {
                const serial = String(i).padStart(3, '0');
                const card = document.createElement('div');
                
                card.className = `card`;
                card.setAttribute('data-index', i);
                card.setAttribute('data-serial', serial);

                card.innerHTML = `
                    <div class="card-media-box">
                        <video class="card-thumb-video" preload="metadata" muted playsinline data-src="videos/${serial}.mp4#t=1"></video>
                        <div class="card-overlay-indicator">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="card-moment-number">#${serial}</span>
                        <span class="card-label">captured</span>
                    </div>
                `;

                card.onclick = () => launchViewerContext(i);
                fragment.appendChild(card);
            }

            grid.appendChild(fragment);
            currentlyRenderedCount = nextThreshold;
            
            evaluateThumbnailsLazyLoading();
            updateWorkingFilterIndexPool();
        }

        function evaluateThumbnailsLazyLoading() {
            const targetVideos = document.querySelectorAll('.card-thumb-video:not([src])');
            
            if ('IntersectionObserver' in window) {
                const lazyObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const vid = entry.target;
                            const card = vid.closest('.card');
                            
                            // Load source metadata
                            vid.src = vid.getAttribute('data-src');
                            
                            // Listen for structural dimensions loading to apply animation entry smoothly
                            vid.onloadedmetadata = () => {
                                card.classList.add('ready');
                            };
                            
                            // Error handling backup fallback safety to trigger card visibility
                            vid.onerror = () => {
                                card.classList.add('ready');
                            };

                            observer.unobserve(vid);
                        }
                    });
                }, { rootMargin: '0px 0px 20px 0px' });

                targetVideos.forEach(vid => lazyObserver.observe(vid));
            } else {
                targetVideos.forEach(vid => {
                    vid.src = vid.getAttribute('data-src');
                    vid.closest('.card').classList.add('ready');
                });
            }
        }

        function buildIntersectionSentinel() {
            const sentinel = document.getElementById('infiniteSentinel');
            const queryBar = document.getElementById('gallerySearch');

            const scrollObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && queryBar.value.trim() === '') {
                    populateBatchSequence();
                }
            }, { rootMargin: '100px' });

            scrollObserver.observe(sentinel);
        }

        // --- Navigation Search Context Processors ---
        function executeSearchFilter() {
            const query = document.getElementById('gallerySearch').value.trim();
            const featuredSection = document.getElementById('featuredSection');
            let matchedCounter = 0;

            if (query !== '') {
                featuredSection.style.display = 'none';
                while (currentlyRenderedCount < totalVideos) {
                    populateBatchSequence();
                }
            } else {
                featuredSection.style.display = 'block';
            }

            const activeCards = document.querySelectorAll('.card');
            activeCards.forEach(card => {
                const serial = card.getAttribute('data-serial');
                if (serial.indexOf(query) !== -1) {
                    card.style.display = 'inline-flex';
                    matchedCounter++;
                } else {
                    card.style.display = 'none';
                }
            });

            document.getElementById('emptyCollectionFeedback').style.display = (matchedCounter === 0) ? 'block' : 'none';
            document.getElementById('liveStatsCount').innerText = `${matchedCounter} Moment${matchedCounter !== 1 ? 's' : ''}`;
            updateWorkingFilterIndexPool();
        }

        function updateWorkingFilterIndexPool() {
            const allCurrentCards = document.querySelectorAll('.card');
            viewFilteredPool = [];
            allCurrentCards.forEach(card => {
                if (card.style.display !== 'none') {
                    viewFilteredPool.push(parseInt(card.getAttribute('data-index')));
                }
            });
        }

        function launchSurpriseMemory() {
            if (viewFilteredPool.length === 0) return;
            const chosenRandomIdx = viewFilteredPool[Math.floor(Math.random() * viewFilteredPool.length)];
            launchViewerContext(chosenRandomIdx);
        }

        function resetFlow(e) {
            e.preventDefault();
            document.getElementById('gallerySearch').value = '';
            executeSearchFilter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function unveilExhibition() {
            document.getElementById('introPortal').classList.add('dismissed');
            document.body.classList.remove('hero-lock');
        }

        // --- Cinema Interface Systems ---
        const backdrop = document.getElementById('cinemaViewer');
        const assetPlayer = document.getElementById('viewerVideoAsset');
        const assetLabel = document.getElementById('viewerAssetLabel');

        function launchViewerContext(index) {
            currentModalActiveIndex = index;
            const normalizedSerial = String(index).padStart(3, '0');
            assetLabel.innerText = `Moment #${normalizedSerial}`;
            
            assetPlayer.src = `videos/${normalizedSerial}.mp4`;
            backdrop.classList.add('active');
            assetPlayer.play().catch(() => {});
        }

        function terminateViewerContext() {
            backdrop.classList.remove('active');
            assetPlayer.pause();
            assetPlayer.removeAttribute('src');
            assetPlayer.load();
        }

        function handleOutsideViewerClick(e) {
            if (e.target === backdrop) {
                terminateViewerContext();
            }
        }

        function stepViewerAsset(direction) {
            if (viewFilteredPool.length === 0) return;
            let currentPointerLocation = viewFilteredPool.indexOf(currentModalActiveIndex);

            if (currentPointerLocation === -1) {
                launchViewerContext(viewFilteredPool[0]);
                return;
            }

            let calculatedNextTarget = currentPointerLocation + direction;
            if (calculatedNextTarget >= viewFilteredPool.length) calculatedNextTarget = 0;
            if (calculatedNextTarget < 0) calculatedNextTarget = viewFilteredPool.length - 1;

            launchViewerContext(viewFilteredPool[calculatedNextTarget]);
        }

        // --- Keyboard Hotkey Core System Maps ---
        window.addEventListener('keydown', (e) => {
            if (!backdrop.classList.contains('active')) return;

            switch(e.key) {
                case 'Escape':
                    terminateViewerContext();
                    break;
                case 'ArrowRight':
                    stepViewerAsset(1);
                    break;
                case 'ArrowLeft':
                    stepViewerAsset(-1);
                    break;
                case ' ':
                    e.preventDefault();
                    if (assetPlayer.paused) {
                        assetPlayer.play();
                    } else {
                        assetPlayer.pause();
                    }
                    break;
            }
        });

        document.addEventListener('DOMContentLoaded', instantiateExhibition);
    </script>
</body>
</html>
